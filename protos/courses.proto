syntax = "proto3";

package courses;
option go_package = "./;coursesservice";

message NewCourseReq {
  string user_id = 1;
  string user_role = 2;
  string name = 3;
  string description = 4;
  string price = 5;
}
message NewCourseRes {
  string course_id = 1;
}

message GetCourseReq {
  string course_id = 1;
}
message GetCourseRes {
  string course_id = 1;
  string name = 2;
  string desciption = 3;
  string price = 4;
}

message UpdateCourseReq {
  string user_id = 1;
  string user_role = 2;
  string course_id = 3;
  string new_name = 4;
  string new_description = 5;
  string new_price = 6;
}
message UpdateCourseRes {}

message DeleteCourseReq {
  string course_id = 1;
  string user_id = 2;
  string user_role = 3;
}
message DeleteCourseRes {}

service CoursesService {
  rpc NewCourse (NewCourseReq) returns (NewCourseRes);
  rpc GetCourse (GetCourseReq) returns (GetCourseRes);
  rpc UpdateCourse (UpdateCourseReq) returns (UpdateCourseRes);
  rpc DeleteCourse (DeleteCourseReq) returns (DeleteCourseRes);
}
